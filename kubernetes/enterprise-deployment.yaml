apiVersion: v1
kind: Namespace
metadata:
  name: secureshield
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: secureshield-config
  namespace: secureshield
data:
  redis-url: "redis://redis-service:6379/0"
  rabbitmq-url: "amqp://guest:guest@rabbitmq-service:5672/"
  kafka-bootstrap: "kafka-service:9092"
  log-level: "INFO"
  environment: "production"
---
apiVersion: v1
kind: Secret
metadata:
  name: secureshield-secrets
  namespace: secureshield
type: Opaque
stringData:
  database-url: "postgresql+asyncpg://postgres:changeme@postgres-service:5432/secureshield"
  secret-key: "changeme-secret-key-min-32-chars"
  encryption-key: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
  redis-password: "redis-password"
  jwt-secret: "jwt-secret-key-min-32-characters"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secureshield-backend
  namespace: secureshield
spec:
  replicas: 3
  selector:
    matchLabels:
      app: secureshield-backend
  template:
    metadata:
      labels:
        app: secureshield-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      serviceAccountName: secureshield-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: backend
        image: secureshield-backend:v2.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: secureshield-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: secureshield-config
              key: redis-url
        - name: RABBITMQ_URL
          valueFrom:
            configMapKeyRef:
              name: secureshield-config
              key: rabbitmq-url
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: secureshield-secrets
              key: secret-key
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: secureshield-secrets
              key: encryption-key
        - name: OPENTELEMETRY_ENABLED
          value: "true"
        - name: ZERO_TRUST_ENABLED
          value: "true"
        - name: MULTI_TENANT_ENABLED
          value: "true"
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: secureshield-backend-service
  namespace: secureshield
spec:
  selector:
    app: secureshield-backend
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secureshield-ai-inference
  namespace: secureshield
spec:
  replicas: 2
  selector:
    matchLabels:
      app: secureshield-ai
  template:
    metadata:
      labels:
        app: secureshield-ai
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
    spec:
      containers:
      - name: ai-service
        image: secureshield-ai-service:v2.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8001
          name: http
        env:
        - name: AI_MODEL_PATH
          value: "/models/sql_injection_model.pkl"
        - name: MLFLOW_ENABLED
          value: "true"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
            nvidia.com/gpu: "1"
          limits:
            memory: "2Gi"
            cpu: "1000m"
            nvidia.com/gpu: "1"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 60
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: secureshield-ai-service
  namespace: secureshield
spec:
  selector:
    app: secureshield-ai
  ports:
  - name: http
    port: 8001
    targetPort: 8001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secureshield-celery-worker
  namespace: secureshield
spec:
  replicas: 4
  selector:
    matchLabels:
      app: secureshield-celery
  template:
    metadata:
      labels:
        app: secureshield-celery
    spec:
      containers:
      - name: celery-main
        image: secureshield-backend:v2.0
        command: ["celery", "-A", "celery_config", "worker", "-Q", "main", "-c", "2"]
        env:
        - name: RABBITMQ_URL
          valueFrom:
            configMapKeyRef:
              name: secureshield-config
              key: rabbitmq-url
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: secureshield-secrets
              key: database-url
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      - name: celery-ai
        image: secureshield-backend:v2.0
        command: ["celery", "-A", "celery_config", "worker", "-Q", "ai-inference", "-c", "1"]
        env:
        - name: RABBITMQ_URL
          valueFrom:
            configMapKeyRef:
              name: secureshield-config
              key: rabbitmq-url
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
      - name: celery-reports
        image: secureshield-backend:v2.0
        command: ["celery", "-A", "celery_config", "worker", "-Q", "reports", "-c", "1"]
        env:
        - name: RABBITMQ_URL
          valueFrom:
            configMapKeyRef:
              name: secureshield-config
              key: rabbitmq-url
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secureshield-celery-beat
  namespace: secureshield
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secureshield-celery-beat
  template:
    metadata:
      labels:
        app: secureshield-celery-beat
    spec:
      containers:
      - name: celery-beat
        image: secureshield-backend:v2.0
        command: ["celery", "-A", "celery_config", "beat", "--loglevel=info"]
        env:
        - name: RABBITMQ_URL
          valueFrom:
            configMapKeyRef:
              name: secureshield-config
              key: rabbitmq-url
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secureshield-frontend
  namespace: secureshield
spec:
  replicas: 2
  selector:
    matchLabels:
      app: secureshield-frontend
  template:
    metadata:
      labels:
        app: secureshield-frontend
    spec:
      containers:
      - name: frontend
        image: secureshield-frontend:v2.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
          name: http
        env:
        - name: REACT_APP_API_URL
          value: "https://api.secureshield.io/api/v1"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: secureshield-frontend-service
  namespace: secureshield
spec:
  selector:
    app: secureshield-frontend
  ports:
  - name: http
    port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: secureshield-ingress
  namespace: secureshield
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/websocket-services: "secureshield-backend-service"
spec:
  tls:
  - hosts:
    - app.secureshield.io
    - api.secureshield.io
    secretName: secureshield-tls
  rules:
  - host: api.secureshield.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: secureshield-backend-service
            port:
              number: 8000
  - host: app.secureshield.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: secureshield-frontend-service
            port:
              number: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: secureshield
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        command: ["redis-server", "--appendonly", "yes", "--requirepass", "redis-password"]
        volumeMounts:
        - name: redis-data
          mountPath: /data
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
      volumes:
      - name: redis-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: secureshield
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: secureshield
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
      - name: rabbitmq
        image: rabbitmq:3-management-alpine
        ports:
        - containerPort: 5672
          name: amqp
        - containerPort: 15672
          name: management
        env:
        - name: RABBITMQ_DEFAULT_USER
          value: "guest"
        - name: RABBITMQ_DEFAULT_PASS
          value: "guest"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-service
  namespace: secureshield
spec:
  selector:
    app: rabbitmq
  ports:
  - name: amqp
    port: 5672
    targetPort: 5672
  - name: management
    port: 15672
    targetPort: 15672
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secureshield-sa
  namespace: secureshield
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secureshield-role
  namespace: secureshield
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: secureshield-rolebinding
  namespace: secureshield
subjects:
- kind: ServiceAccount
  name: secureshield-sa
  namespace: secureshield
roleRef:
  kind: Role
  name: secureshield-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: secureshield-backend-hpa
  namespace: secureshield
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: secureshield-backend
  minReplicas: 2
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: secureshield-backend-pdb
  namespace: secureshield
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: secureshield-backend
---
apiVersion: v1
kind: PodDisruptionBudget
metadata:
  name: secureshield-ai-pdb
  namespace: secureshield
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: secureshield-ai
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: secureshield-backend-monitor
  namespace: secureshield
spec:
  selector:
    matchLabels:
      app: secureshield-backend
  endpoints:
  - port: http
    path: /api/v1/health
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: secureshield-ai-monitor
  namespace: secureshield
spec:
  selector:
    matchLabels:
      app: secureshield-ai
  endpoints:
  - port: http
    path: /metrics